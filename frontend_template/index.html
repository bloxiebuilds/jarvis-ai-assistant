<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jarvis AI Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #a87b3d; /* Gold accent */
            --secondary-color: #c0c0c0; /* Silver accent */
            --bg-color: #1a1a2e; /* Deep navy/dark purple */
            --panel-bg: #2a2a4a; /* Slightly lighter panel background */
            --text-color: #e0e0e0;
            --heading-color: #a87b3d;
            --border-color: rgba(168, 123, 61, 0.3);
        }
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            line-height: 1.6;
        }
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            width: 100%;
            padding: 20px;
            box-sizing: border-box;
        }
        .main-panel {
            background-color: var(--panel-bg);
            border-radius: 12px;
            padding: 40px;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border-color);
            text-align: center;
        }
        h1 {
            font-family: 'Playfair Display', serif;
            color: var(--heading-color);
            margin-bottom: 20px;
            font-size: 3em;
            letter-spacing: 2px;
        }
        p {
            font-size: 1.1em;
            color: var(--secondary-color);
            margin-bottom: 30px;
        }
        .mic-btn {
            background-color: var(--primary-color);
            border: none;
            color: var(--bg-color);
            width: 100px;
            height: 100px;
            border-radius: 50%;
            font-size: 36px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 25px;
            box-shadow: 0 5px 15px rgba(168, 123, 61, 0.4);
        }
        .mic-btn:hover {
            background-color: #c29a5c;
            box-shadow: 0 8px 20px rgba(168, 123, 61, 0.6);
            transform: scale(1.05);
        }
        .mic-btn.listening {
            background-color: var(--secondary-color);
            color: var(--bg-color);
            animation: pulse-luxury 1.8s infinite;
            box-shadow: 0 0 20px rgba(192, 192, 192, 0.7);
        }
        .status-text {
            font-style: italic;
            color: var(--secondary-color);
            min-height: 28px;
            font-size: 1.1em;
        }
        /* Placeholder for ElevenLabs widget - replace with actual embed code */
        .elevenlabs-widget-placeholder {
            background-color: rgba(0, 0, 0, 0.3);
            border: 1px dashed var(--secondary-color);
            padding: 20px;
            margin-top: 30px;
            border-radius: 8px;
            color: #aaa;
            font-size: 0.9em;
        }
        @keyframes pulse-luxury {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(192, 192, 192, 0.5); }
            70% { transform: scale(1.08); box-shadow: 0 0 0 18px rgba(192, 192, 192, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(192, 192, 192, 0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="main-panel">
            <h1>Your Personal AI Assistant</h1>
            <p>Ready to assist with your commands. Click the microphone and speak.</p>
            
            <!-- This button is a placeholder. In a real setup, this would be replaced or integrated with the ElevenLabs conversational widget. -->
            <button class="mic-btn" id="micBtn">🎙️</button>
            <div class="status-text" id="statusText">Awaiting your command...</div>

            <div class="elevenlabs-widget-placeholder">
                [Embed ElevenLabs Conversational Widget Here]
                <br>
                (This section will be replaced by the actual ElevenLabs widget code from your ElevenLabs project settings)
            </div>
        </div>
    </div>

    <script>
        const micBtn = document.getElementById('micBtn');
        const statusText = document.getElementById('statusText');
        let isListening = false;

        // This is a simplified script for demonstration. 
        // In a real application, the ElevenLabs widget would handle the actual listening and processing.
        micBtn.addEventListener('click', () => {
            if (isListening) {
                stopListening();
            } else {
                startListening();
            }
        });

        function startListening() {
            isListening = true;
            micBtn.classList.add('listening');
            statusText.innerText = "Listening... Please speak.";
            // In a real scenario, this would activate the ElevenLabs widget's listening mode
        }

        function stopListening() {
            isListening = false;
            micBtn.classList.remove('listening');
            statusText.innerText = "Awaiting your command...";
            // In a real scenario, this would deactivate the ElevenLabs widget's listening mode
        }
    </script>
</body>
</html>
